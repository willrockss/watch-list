services:
  postgres:
    image: postgres:latest
    container_name: pg
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=watch_list
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
      
  video-server:
    image: video-server:latest
    container_name: video-server
    environment:
      CURR_HOST: 192.168.0.2 # Put your own localhost IP address
      WATCH_LIST_HOST: watch-list
    ports:
      - "8000:8000"
    volumes:
      - ~/Videos:/downloads # Put a preferrable folder for Videos. Use same mount point as for qbitt
    restart: unless-stopped

  watch-list:
    image: io.kluev/watch-list:latest
    container_name: watch-list
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://pg:5432/watch-list
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/config/
      LOG_DIR: /logs/watch-list
      BPL_JVM_HEAD_ROOM: 10 
      BPL_JVM_THREAD_COUNT: 50
      JAVA_TOOL_OPTIONS: -Xmx512m -Xms256m  # Explicit min/max heap  
    ports:
      - "8060:8060"
    volumes:
      - ./watch-list-config:/config
      - ./logs/watch-list:/logs/watch-list
      - ./tmp:/var/watch-list-files
      - ~/Videos:/downloads # Put a preferrable folder for Videos. Use same mount point as for qbitt
    deploy:
      resources:
        limits:
          memory: 1200m  # Set container memory to 1.2GB        
    depends_on:
      - postgres
      - restate
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://watch-list:8060/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  restate-register:
    image: curlimages/curl:latest
    depends_on:
      restate:
        condition: service_healthy
      watch-list:
        condition: service_started
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
          echo 'Waiting for Restate Admin API...'
          until curl -s http://restate:9070/health; do sleep 1; done

          echo 'Registering watch-list service...'
          echo '-----------------------'
          echo '-----------------------'

          curl -X POST http://restate:9070/deployments \
              -H 'Content-Type: application/json' \
              -d '{"uri": "http://watch-list:9080"}'

          echo
          echo '-----------------------'
          echo '-----------------------'
          echo 'Registration successful for watch-list!'

  watch-list-presenter:
    image: io.kluev/watch-list-presenter:latest
    mem_limit: 612m  
    container_name: watch-list-presenter
    environment:
      WATCH_LIST_BACKEND_URL: http://watch-list:8060
      SPRING_PROFILES_ACTIVE: prod
      LOG_DIR: /logs/watch-list-presenter
      JAVA_TOOL_OPTIONS: -Xmx512m -Xms256m  # Explicit min/max heap  
    ports:
      - "8080:8080"
    volumes:
      - ./logs/watch-list-presenter:/logs/watch-list-presenter
    depends_on:
      - watch-list
    restart: unless-stopped

  node-red:
    image: nodered/node-red:3.1-debian
    container_name: node-red
    hostname: node-red
    ports:
      - "1880:1880"  # Node-RED web UI port
    volumes:
      - ./node-red-data:/data  # Mount host directory to container's /data
    environment:
      TZ: "Europe/Moscow"
      CURR_HOST: 192.168.0.2 # Put your own localhost IP address
      NODE_RED_ENABLE_PROJECTS: "true" 
      MODE: PROD
    restart: unless-stopped

  qbittorrent:
    image: qbittorrentofficial/qbittorrent-nox
    container_name: qbit
    hostname: qbit
    environment:
      WEBUI_CSRF_PROTECTION: false
      WEBUI_SECURITY_ENABLED: false
    ports:
      - "8585:8080"      # WebUI port
      - "6881:6881"      # Torrent port
      - "6881:6881/udp"
    volumes:
      - ./qbit-config:/config  # Mount config directory
      - ~/Videos:/downloads # Put a preferrable folder for Videos
    restart: unless-stopped

  restate:
    image: docker.restate.dev/restatedev/restate:1.6.2
    container_name: restate
    restart: unless-stopped
    ports:
      - "8080:8080"   # Ingress API (вызов сервисов)
      - "9070:9070"   # Admin API + UI
      - "5122:5122"   # Внутренняя коммуникация узлов
    volumes:
      - ./restate-data:/restate-data
    environment:
      - RESTATE_NODE_NAME=restate-local
      - RESTATE_LOG_FILTER=restate=info
      # Для доступа к сервисам на хосте (например, ваш worker на localhost:9080)
      - EXTRA_HOSTS=host.docker.internal:host-gateway
      - RESTATE_INGRESS__ADVERTISED_ADDRESS=http://192.168.0.2:8080 # Put your own localhost IP address
      - RESTATE_OBSERVABILITY__PUBLIC_ENDPOINT=http://192.168.0.2:8080 # Put your own localhost IP address
    command: --node-name restate-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9070/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s